# Nginx 配置文件 - 全网最穷站
# 位置: /etc/nginx/sites-enabled/shipinzs-nodejs
# 
# 功能:
# - 反向代理到 Node.js (localhost:3000)
# - 静态资源缓存 (1 年)
# - HTML 缓存 (5 分钟)
# - Gzip 压缩
# - 速率限制
# - HTTPS 支持 (可选)

# 上游服务器定义
upstream nodejs_backend {
    # 连接池配置
    keepalive 32;
    
    # Node.js 应用服务器
    server localhost:3000 max_fails=3 fail_timeout=30s;
}

# 缓存路径定义
proxy_cache_path /var/cache/nginx/poorest_site levels=1:2 keys_zone=poorest_cache:10m max_size=1g inactive=60m use_temp_path=off;

# HTTP 重定向到 HTTPS (如果有 SSL 证书)
# server {
#     listen 80;
#     server_name shipinzs.xyz www.shipinzs.xyz;
#     return 301 https://$server_name$request_uri;
# }

# 主服务器配置
server {
    listen 8080;
    server_name shipinzs.xyz www.shipinzs.xyz;
    
    # 日志配置
    access_log /var/log/nginx/poorest_site_access.log combined buffer=32k flush=5s;
    error_log /var/log/nginx/poorest_site_error.log warn;
    
    # 客户端最大请求体大小 (用于文件上传)
    client_max_body_size 50m;
    
    # 请求超时时间
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    
    # ==================== 静态资源处理 ====================
    
    # 静态资源缓存 1 年 (CSS, JS, 图片等)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://nodejs_backend;
        proxy_cache poorest_cache;
        proxy_cache_valid 200 365d;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        
        # 缓存控制头
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Cache-Status $upstream_cache_status;
        
        # 连接复用
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
    
    # ==================== HTML 页面缓存 ====================
    
    # 首页和其他 HTML 页面 - 缓存 5 分钟
    location ~ \.(html|htm)$ {
        proxy_pass http://nodejs_backend;
        proxy_cache poorest_cache;
        proxy_cache_valid 200 5m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        
        # 不缓存 Cookie 相关的请求
        proxy_cache_bypass $http_pragma $http_authorization;
        
        # 缓存控制头
        add_header Cache-Control "public, max-age=300";
        add_header X-Cache-Status $upstream_cache_status;
        
        # 连接复用
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
    
    # ==================== API 请求处理 ====================
    
    # tRPC API - 不缓存，但启用连接复用
    location /api/trpc {
        proxy_pass http://nodejs_backend;
        
        # 不缓存 API 请求
        proxy_cache_bypass 1;
        proxy_no_cache 1;
        
        # 连接复用
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        # 传递必要的头部
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 超时配置
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
    
    # OAuth 回调 - 不缓存
    location /api/oauth {
        proxy_pass http://nodejs_backend;
        
        proxy_cache_bypass 1;
        proxy_no_cache 1;
        
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # ==================== 默认代理 ====================
    
    # 所有其他请求
    location / {
        proxy_pass http://nodejs_backend;
        
        # 缓存配置 - 根据响应头决定
        proxy_cache poorest_cache;
        proxy_cache_valid 200 1m;
        proxy_cache_bypass $http_pragma $http_authorization;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        
        # 连接复用
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        # 传递必要的头部
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # Cookie 处理
        proxy_set_header Cookie $http_cookie;
        
        # 缓存状态头
        add_header X-Cache-Status $upstream_cache_status;
    }
    
    # ==================== 健康检查 ====================
    
    location /health {
        proxy_pass http://nodejs_backend;
        proxy_cache_bypass 1;
        proxy_no_cache 1;
        access_log off;
    }
    
    # ==================== 性能优化 ====================
    
    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss 
               application/json application/javascript;
    gzip_disable "msie6";
    gzip_comp_level 6;
    
    # 缓冲区优化
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;
    proxy_busy_buffers_size 8k;
    
    # 速率限制 - 防止滥用
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=30r/s;
    
    # ==================== 安全头部 ====================
    
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # ==================== SEO 优化 ====================
    
    # 允许百度爬虫
    location /robots.txt {
        proxy_pass http://nodejs_backend;
        proxy_cache poorest_cache;
        proxy_cache_valid 200 1d;
        add_header Cache-Control "public, max-age=86400";
    }
    
    location /sitemap.xml {
        proxy_pass http://nodejs_backend;
        proxy_cache poorest_cache;
        proxy_cache_valid 200 1d;
        add_header Cache-Control "public, max-age=86400";
    }
}

# ==================== 缓存清理定时任务 ====================
# 在 crontab 中添加:
# 0 2 * * * /usr/sbin/nginx -s reload
# 
# 这样每天凌晨 2 点会重新加载 Nginx 配置，清理过期缓存
